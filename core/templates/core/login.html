{% extends 'core/base.html' %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="font-size: 3rem; color: #6366f1;"><i class="bi bi-check2-square"></i></div>
            <h2 class="fw-bold">DevTask</h2>
            <p class="text-muted">Sign in to your workspace</p>
        </div>
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 py-2 mt-1">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            <p class="text-center text-muted small mt-3 mb-0">
                No account? <a href="{% url 'register' %}" class="text-primary fw-600">Register here</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
