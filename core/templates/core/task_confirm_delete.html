{% extends 'core/base.html' %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-5 text-center">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🗑️</div>
            <h4 class="fw-bold mb-2">Delete Task?</h4>
            <p class="text-muted mb-4">You're about to delete <strong>"{{ task.title }}"</strong>. This action cannot be undone.</p>
            <form method="post" class="d-flex gap-3 justify-content-center">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                <a href="{% url 'task_detail' task.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
