deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        run: |
          ssh -i ~/.ssh/id_rsa $SSH_USERNAME@$SSH_HOST 'cd ~/00016014_DSCC_CW1 && git pull origin main && docker compose pull && docker compose down && docker compose up -d && sleep 10 && docker compose exec -T web python manage.py makemigrations core && docker compose exec -T web python manage.py migrate && docker compose exec -T web python manage.py collectstatic --noinput && echo Deployment complete'
          